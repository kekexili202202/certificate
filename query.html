<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>法律英语大赛证书查询系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #e2e8f0 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }
        .system-wrapper { max-width: 1400px; margin: 0 auto; }

        .title-section { text-align: center; margin: 0.5rem 0 2rem 0; }
        .main-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1f3e48, #9b2e2e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .title-underline {
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, #b87c4f, #9b2e2e);
            margin: 0.5rem auto 0;
            border-radius: 4px;
        }
        .button-group {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }
        .cert-btn {
            background: white;
            border: none;
            padding: 0.9rem 2.2rem;
            border-radius: 3rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #2c4c6e;
            border: 1px solid #e0e7ed;
            box-shadow: 0 5px 12px rgba(0,0,0,0.1);
            transition: all 0.2s;
        }
        .cert-btn.active {
            background: linear-gradient(135deg, #2c5a6e, #8b3c3c);
            color: white;
            border: none;
            transform: translateY(-2px);
        }
        .query-layout { display: flex; flex-wrap: wrap; gap: 2rem; }
        .query-card {
            flex: 1.2;
            min-width: 300px;
            background: rgba(255,255,255,0.96);
            border-radius: 2rem;
            padding: 1.8rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.12);
        }
        .query-header { text-align: center; margin-bottom: 1.5rem; }
        .query-header i {
            font-size: 2.2rem;
            background: #f0e7db;
            padding: 0.6rem;
            border-radius: 60px;
            color: #8b5a2b;
        }
        .query-header h3 { margin-top: 0.5rem; font-weight: 700; color: #2c4c6e; }
        .input-group {
            margin-bottom: 1.2rem;
            display: flex;
            flex-direction: column;
        }
        .input-group label {
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #2c5a6e;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .input-group input {
            padding: 0.8rem 1rem;
            border-radius: 1.2rem;
            border: 1.5px solid #e2e8f0;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }
        .input-group input:focus {
            border-color: #9b2e2e;
        }
        .btn-query {
            background: linear-gradient(95deg, #2c5a6e, #9b2e2e);
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 3rem;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }
        .btn-query:hover { opacity: 0.92; }
        .error-msg {
            background: #ffe8e6;
            color: #c2412c;
            padding: 0.8rem;
            border-radius: 1.2rem;
            margin-top: 1rem;
            text-align: center;
            font-size: 0.85rem;
            display: none;
        }
        .certificate-card {
            flex: 2;
            min-width: 500px;
            background: #fffef7;
            border-radius: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.25);
            overflow: auto;
            max-height: 85vh;
            border: 1px solid #eeddbb;
        }
        .certificate-preview {
            padding: 2rem;
            background: #f5f5f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .participant-info-card {
            background: #faf6ed;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            width: 100%;
            border: 1px solid #eeddbb;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .participant-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2c553d;
        }
        .cert-number {
            font-family: 'Times New Roman', Times, serif;
            font-size: 0.9rem;
            color: #8b5a2b;
            background: white;
            padding: 0.3rem 0.8rem;
            border-radius: 1.5rem;
            border: 1px solid #eddabc;
            letter-spacing: 0.5px;
        }
        .participant-details {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #8b6b42;
        }
        .award-level {
            display: inline-block;
            background: linear-gradient(135deg, #f0e7db, #e8d9c8);
            padding: 0.2rem 0.8rem;
            border-radius: 1rem;
            margin-left: 1rem;
            font-size: 0.75rem;
            color: #9b2e2e;
            font-weight: 600;
        }
        .pdf-container {
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border-radius: 8px;
            overflow: hidden;
            max-width: 100%;
        }
        .result-canvas { display: block; max-width: 100%; height: auto; }
        .btn-download {
            background: #2c5f2d;
            border: none;
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            margin-top: 1.5rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .btn-download:hover { background: #1f4520; }
        .empty-state { padding: 3rem; text-align: center; color: #a28e6f; }
        .loading { text-align: center; padding: 2rem; color: #2c5a6e; }
        .loading i { font-size: 2rem; margin-bottom: 1rem; }
        @media (max-width: 780px) {
            .certificate-preview { padding: 1rem; }
            .main-title { font-size: 1.8rem; }
            .certificate-card { min-width: 300px; }
        }
    </style>
</head>
<body>
<div class="system-wrapper">
    <div class="title-section">
        <div class="main-title">法律英语大赛证书查询</div>
        <div class="title-underline"></div>
    </div>

    <div class="button-group">
        <button class="cert-btn active" id="btnParticipation"><i class="fas fa-scroll"></i> 参赛证明</button>
        <button class="cert-btn" id="btnPreliminary"><i class="fas fa-trophy"></i> 预赛获奖证书</button>
        <button class="cert-btn" id="btnFinal"><i class="fas fa-crown"></i> 决赛获奖证书</button>
    </div>

    <div class="query-layout">
        <div class="query-card">
            <div class="query-header">
                <i class="fas fa-user-check"></i>
                <h3>选手信息核验</h3>
                <p style="font-size:0.75rem;">请输入以下四项信息查询证书</p>
            </div>
            <div class="input-group">
                <label><i class="fas fa-user"></i> 姓名</label>
                <input type="text" id="fullname" placeholder="请输入真实姓名">
            </div>
            <div class="input-group">
                <label><i class="fas fa-map-marker-alt"></i> 赛区</label>
                <input type="text" id="region" placeholder="例: 华北及东北赛区">
            </div>
            <div class="input-group">
                <label><i class="fas fa-mobile-alt"></i> 手机号</label>
                <input type="tel" id="phone" placeholder="11位手机号" maxlength="11">
            </div>
            <div class="input-group">
                <label><i class="fas fa-building"></i> 所在单位</label>
                <input type="text" id="organization" placeholder="学校/机构">
            </div>
            <button class="btn-query" id="searchBtn"><i class="fas fa-search"></i> 查询证书</button>
            <div id="errorMsg" class="error-msg"><i class="fas fa-exclamation-triangle"></i> <span>未查找到您的信息</span></div>
        </div>

        <div class="certificate-card">
            <div id="certificateRenderArea" class="certificate-preview">
                <div class="empty-state"><i class="fas fa-file-pdf"></i><p>请输入信息查询证书</p></div>
            </div>
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    // 模板存储
    let pdfTemplates = {};           // 参赛证明模板 (region -> {url, name})
    let pdfTemplatesPrelim = {};     // 预赛获奖模板 (region -> {level -> {url, name}})
    let pdfTemplatesFinal = {};       // 决赛获奖模板 (region -> {level -> {url, name}})
    let currentCertType = "participation";
    let currentResultCanvas = null;

    const validRegions = ["华北及东北赛区", "西北赛区", "西南赛区", "华东赛区", "华南赛区"];
    const awardLevels = ["一等奖", "二等奖", "三等奖"];

    // ==================== 辅助函数 ====================
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ==================== 从 templates_pdf 文件夹加载模板 ====================
    async function loadTemplatesFromFolder() {
        console.log("开始从 templates_pdf 文件夹加载模板...");

        // 清空旧模板
        pdfTemplates = {};
        pdfTemplatesPrelim = {};
        pdfTemplatesFinal = {};

        // 1. 加载参赛证明模板（文件名格式：{赛区}参赛证明.pdf）
        for (const region of validRegions) {
            const fileName = `${region}参赛证明.pdf`;
            const fileUrl = `/templates_pdf/${encodeURIComponent(fileName)}`;
            try {
                const response = await fetch(fileUrl);
                if (response.ok) {
                    const blob = await response.blob();
                    const blobUrl = URL.createObjectURL(blob);
                    pdfTemplates[region] = { url: blobUrl, name: fileName };
                    console.log(`✅ 加载参赛证明模板：${region}`);
                }
            } catch (err) {
                console.warn(`未找到参赛证明模板：${fileName}`);
            }
        }

        // 2. 加载预赛获奖模板（支持按奖项等级区分：{赛区}预赛{奖项}.pdf）
        for (const region of validRegions) {
            pdfTemplatesPrelim[region] = {};
            for (const level of awardLevels) {
                // 尝试多种可能的文件名格式
                const possibleNames = [
                    `${region}预赛${level}.pdf`,           // 西北赛区预赛一等奖.pdf
                    `${region}预赛获奖证书${level}.pdf`,   // 西北赛区预赛获奖证书一等奖.pdf
                    `${region}预赛${level}获奖证书.pdf`    // 西北赛区预赛一等奖获奖证书.pdf
                ];

                let found = false;
                for (const fileName of possibleNames) {
                    const fileUrl = `/templates_pdf/${encodeURIComponent(fileName)}`;
                    try {
                        const response = await fetch(fileUrl);
                        if (response.ok) {
                            const blob = await response.blob();
                            const blobUrl = URL.createObjectURL(blob);
                            pdfTemplatesPrelim[region][level] = { url: blobUrl, name: fileName };
                            console.log(`✅ 加载预赛模板：${fileName}`);
                            found = true;
                            break;
                        }
                    } catch (err) {
                        // 继续尝试下一种格式
                    }
                }
                if (!found) {
                    console.warn(`⚠️ 未找到预赛模板：${region} ${level}`);
                }
            }
        }

        // 3. 加载决赛获奖模板（不分赛区，只按奖项等级）
        // 决赛模板文件名格式：决赛一等奖.pdf、决赛二等奖.pdf、决赛三等奖.pdf
        for (const level of awardLevels) {
            // 尝试多种可能的文件名格式
            const possibleNames = [
                `决赛${level}.pdf`,                    // 决赛一等奖.pdf
                `决赛获奖证书${level}.pdf`,            // 决赛获奖证书一等奖.pdf
                `${level}决赛.pdf`                     // 一等奖决赛.pdf
            ];

            let found = false;
            for (const fileName of possibleNames) {
                const fileUrl = `/templates_pdf/${encodeURIComponent(fileName)}`;
                try {
                    const response = await fetch(fileUrl);
                    if (response.ok) {
                        const blob = await response.blob();
                        const blobUrl = URL.createObjectURL(blob);
                        // 不分赛区，用一个通用键 "all" 或者直接用奖项等级作为键
                        if (!pdfTemplatesFinal['all']) {
                            pdfTemplatesFinal['all'] = {};
                        }
                        pdfTemplatesFinal['all'][level] = { url: blobUrl, name: fileName };
                        console.log(`✅ 加载决赛模板：${fileName}`);
                        found = true;
                        break;
                    }
                } catch (err) {
                    // 继续尝试下一种格式
                }
            }
            if (!found) {
                console.warn(`⚠️ 未找到决赛模板：${level}`);
            }
        }

        // 统计加载结果
        let prelimCount = 0, finalCount = 0;
        for (const region of validRegions) {
            prelimCount += Object.keys(pdfTemplatesPrelim[region] || {}).length;
            finalCount += Object.keys(pdfTemplatesFinal[region] || {}).length;
        }

        console.log(`✅ 模板加载完成: 参赛证明 ${Object.keys(pdfTemplates).length}, 预赛 ${prelimCount}, 决赛 ${finalCount}`);
    }

    // ==================== 查询选手信息（支持参赛证明、预赛、决赛） ====================
    async function performQuery() {
        const name = document.getElementById('fullname').value.trim();
        const region = document.getElementById('region').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const org = document.getElementById('organization').value.trim();

        if (!name || !region || !phone || !org) {
            showError("请完整填写姓名、赛区、手机号和所在单位四项信息", true);
            return;
        }

        const phoneRegex = /^1[3-9]\d{9}$/;
        if (!phoneRegex.test(phone)) {
            showError("请输入正确的11位手机号", true);
            return;
        }

        try {
            let url = '/api/participants/query';
            let body = { name, region, phone, organization: org };

            if (currentCertType === 'preliminary') {
                url = '/api/participants/query_with_award';
                body.cert_type = 'preliminary';
            } else if (currentCertType === 'final') {
                url = '/api/participants/query_with_award';
                body.cert_type = 'final';
            }

            console.log(`查询${currentCertType}证书，参数:`, body);

            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();

            console.log("查询结果:", data);

            if (data.found && data.participant) {
                showError("", false);
                await generateCertificate(data.participant);
            } else {
                let errorMsg = '';
                if (currentCertType === 'participation') {
                    errorMsg = '未查找到您的参赛信息，请核对姓名、赛区、手机号、单位是否与报名一致';
                } else if (currentCertType === 'preliminary') {
                    errorMsg = '未查找到您的预赛获奖信息，请确认是否在预赛获奖名单中';
                } else {
                    errorMsg = '未查找到您的决赛获奖信息，请确认是否在决赛获奖名单中';
                }
                showError(errorMsg, true);
                document.getElementById('certificateRenderArea').innerHTML = `<div class="empty-state"><i class="fas fa-search"></i><p>${errorMsg}</p><p style="font-size:0.8rem;">请检查输入是否正确</p></div>`;
            }
        } catch (err) {
            console.error('查询接口错误:', err);
            showError("查询失败，请稍后重试", true);
        }
    }

    // ==================== PDF 姓名 + 证书编号绘制 ====================
    function formatNameWithSpaces(name) {
        if (!name) return "";
        const trimmed = name.trim();
        let namePart = trimmed.length === 2 ? trimmed[0] + "　" + trimmed[1] : trimmed;
        return "　" + namePart + "　";
    }

    async function replaceNameAndCertificateOnCanvas(canvas, name, certificateNumber, certType) {
        return new Promise((resolve) => {
            const ctx = canvas.getContext('2d');
            const width = canvas.width, height = canvas.height;
            const imgData = ctx.getImageData(0, 0, width, height);
            const pixels = imgData.data;
            let underlineY = -1, startX = -1, endX = -1;

            for (let y = Math.floor(height * 0.3); y < Math.floor(height * 0.8); y++) {
                let maxLen = 0, lineStart = -1, lineEnd = -1, curLen = 0, curStart = -1;
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    const isDark = pixels[idx] < 80 && pixels[idx+1] < 80 && pixels[idx+2] < 80;
                    if (isDark) {
                        if (curStart === -1) curStart = x;
                        curLen++;
                    } else {
                        if (curLen > 30 && curLen > maxLen) {
                            maxLen = curLen;
                            lineStart = curStart;
                            lineEnd = x - 1;
                        }
                        curLen = 0;
                        curStart = -1;
                    }
                }
                if (curLen > 30 && curLen > maxLen) {
                    maxLen = curLen;
                    lineStart = curStart;
                    lineEnd = width - 1;
                }
                if (maxLen > 80) {
                    underlineY = y;
                    startX = lineStart;
                    endX = lineEnd;
                    break;
                }
            }

            if (underlineY === -1) {
                underlineY = Math.floor(height * 0.6);
                startX = Math.floor(width * 0.35);
                endX = Math.floor(width * 0.65);
            }

            const fixedLeft = startX;
            ctx.save();
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(fixedLeft - 20, underlineY - 95, (endX - startX) + 520, 150);

            const nameY = underlineY - 32;
            let fontSize = Math.floor(width / 65);
            fontSize = Math.min(fontSize, 80);
            fontSize = Math.max(fontSize, 80);

            ctx.font = `${fontSize}px "华文行楷", "STXingkai", "KaiTi", cursive`;
            ctx.fillStyle = "#000000";
            ctx.textAlign = "left";
            ctx.textBaseline = "middle";
            const formattedName = formatNameWithSpaces(name);
            ctx.fillText(formattedName, fixedLeft, nameY);

            const nameWidth = ctx.measureText(formattedName).width;
            const underlineYPos = nameY + fontSize * 0.48;
            ctx.beginPath();
            ctx.lineWidth = Math.max(fontSize * 0.07, 3);
            ctx.strokeStyle = "#000000";
            ctx.moveTo(fixedLeft - 3, underlineYPos);
            ctx.lineTo(fixedLeft + nameWidth + 8, underlineYPos);
            ctx.stroke();

            // 绘制证书编号
            if (certificateNumber && certificateNumber !== "") {
                let certFontSize = Math.floor(fontSize * 0.75);
                // 根据证书类型选择不同的 X 位置
                let certX;
                if (certType === 'preliminary') {
                    certX = fixedLeft + 1255;  // 预赛获奖证书位置
                } else if (certType === 'final') {
                    certX = fixedLeft + 1230;  // 决赛获奖证书位置
                } else {
                    certX = fixedLeft + 1260;  // 参赛证明位置
                }
                const certY = nameY + fontSize * 0.17;
                let currentX = certX;

                ctx.font = `bold ${certFontSize}px "Times New Roman", serif`;
                ctx.fillStyle = "#000000";
                ctx.fillText("NO.", currentX, certY);
                currentX += ctx.measureText("NO.").width;

                ctx.font = `${certFontSize}px "Times New Roman", serif`;
                ctx.fillStyle = "#000000";
                ctx.fillText(" ", currentX, certY);
                currentX += ctx.measureText(" ").width;

                ctx.font = `${certFontSize}px "Times New Roman", serif`;
                ctx.fillStyle = "#000000";
                ctx.fillText(certificateNumber, currentX, certY);
            }

            ctx.restore();
            resolve(canvas);
        });
    }

    async function renderPdfWithReplacements(pdfData, name, certificateNumber, certType) {
        if (!pdfData || !pdfData.url) throw new Error("模板无效");
        const loadingTask = pdfjsLib.getDocument(pdfData.url);
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        const scale = 3.0;
        const viewport = page.getViewport({ scale: scale });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
        return await replaceNameAndCertificateOnCanvas(canvas, name, certificateNumber, certType);
    }

    // ==================== 生成最终证书展示 ====================
    async function generateCertificate(participant) {
        if (!participant) return false;
        const region = participant.赛区;
        if (!region) {
            document.getElementById('certificateRenderArea').innerHTML = `<div class="empty-state"><p>❌ 选手信息缺少赛区字段</p></div>`;
            return false;
        }

        let pdfData = null;
        let certTypeName = '';
        let awardLevel = participant.奖项等级 || '';

        if (currentCertType === "participation") {
            pdfData = pdfTemplates[region];
            certTypeName = '参赛证明';
        } else if (currentCertType === "preliminary") {
            // 根据奖项等级选择对应的模板
            if (!awardLevel) {
                document.getElementById('certificateRenderArea').innerHTML = `<div class="empty-state"><p>❌ 未找到您的奖项等级信息</p><p style="font-size:0.8rem;">请确认Excel中H列是否填写了奖项等级（一等奖/二等奖/三等奖）</p></div>`;
                return false;
            }
            pdfData = pdfTemplatesPrelim[region]?.[awardLevel];
            certTypeName = `预赛${awardLevel}`;
            console.log(`预赛模板查找: ${region} ${awardLevel}, 找到: ${!!pdfData}`);
        } else {
            // 决赛获奖证书 - 不分赛区，使用通用模板
            if (!awardLevel) {
                document.getElementById('certificateRenderArea').innerHTML = `<div class="empty-state"><p>❌ 未找到您的奖项等级信息</p><p style="font-size:0.8rem;">请确认Excel中H列是否填写了奖项等级（一等奖/二等奖/三等奖）</p></div>`;
                return false;
            }
            // 不分赛区，从 'all' 键获取模板
            pdfData = pdfTemplatesFinal['all']?.[awardLevel];
            certTypeName = `决赛${awardLevel}`;
            console.log(`决赛模板查找: 奖项等级 ${awardLevel}, 找到: ${!!pdfData}`);
        }

        if (!pdfData) {
            let errorMsg = '';
            if (currentCertType === 'participation') {
                errorMsg = `❌ 未找到 ${region} 的参赛证明模板`;
            } else if (currentCertType === 'preliminary') {
                errorMsg = `❌ 未找到 ${region} ${awardLevel} 的预赛模板<br>请确保模板文件存在：${region}预赛${awardLevel}.pdf`;
            } else {
                errorMsg = `❌ 未找到 ${region} ${awardLevel} 的决赛模板<br>请确保模板文件存在：${region}决赛${awardLevel}.pdf`;
            }
            document.getElementById('certificateRenderArea').innerHTML = `<div class="empty-state"><p>${errorMsg}</p><p style="font-size:0.8rem;">请联系管理员上传对应模板到 templates_pdf 文件夹</p></div>`;
            return false;
        }

        document.getElementById('certificateRenderArea').innerHTML = `<div class="loading"><i class="fas fa-spinner fa-pulse fa-2x"></i><p>正在生成证书，请稍候...</p></div>`;

        try {
            const certificateNumber = participant.证书编号 || "";
            const canvas = await renderPdfWithReplacements(pdfData, participant.姓名, certificateNumber, currentCertType);
            currentResultCanvas = canvas;
            const imageUrl = canvas.toDataURL('image/png');

            let awardHtml = '';
            if (awardLevel) {
                awardHtml = `<span class="award-level"><i class="fas fa-trophy"></i> ${escapeHtml(awardLevel)}</span>`;
            }

            const html = `
                <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
                    <div class="participant-info-card">
                        <div class="info-row">
                            <span class="participant-name"><i class="fas fa-user"></i> ${escapeHtml(participant.姓名)}</span>
                            <span class="cert-number"><i class="fas fa-certificate"></i> 证书编号：${escapeHtml(certificateNumber || '暂无')}</span>
                            ${awardHtml}
                        </div>
                        <div class="participant-details">
                            <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(participant.赛区)}</span>
                            <span style="margin-left:1rem;"><i class="fas fa-building"></i> ${escapeHtml(participant.所在单位)}</span>
                        </div>
                    </div>
                    <div class="pdf-container">
                        <img src="${imageUrl}" class="result-canvas" alt="证书图片">
                    </div>
                    <button id="downloadBtn" class="btn-download">
                        <i class="fas fa-download"></i> 下载PNG证书
                    </button>
                </div>`;
            document.getElementById('certificateRenderArea').innerHTML = html;

            const downloadBtn = document.getElementById('downloadBtn');
            if (downloadBtn) {
                downloadBtn.onclick = () => {
                    const link = document.createElement('a');
                    const serialNo = certificateNumber ? `_${certificateNumber}` : '';
                    link.download = `法律英语大赛_${certTypeName}_${participant.姓名}${serialNo}.png`;
                    link.href = currentResultCanvas.toDataURL('image/png');
                    link.click();
                };
            }
            return true;
        } catch (err) {
            console.error('生成证书失败:', err);
            document.getElementById('certificateRenderArea').innerHTML = `<div class="empty-state"><p>生成失败: ${err.message}</p><p style="font-size:0.8rem;">请刷新页面后重试或联系管理员</p></div>`;
            return false;
        }
    }

    function showError(msg, show) {
        const div = document.getElementById('errorMsg');
        if (show) {
            div.style.display = 'block';
            const span = div.querySelector('span');
            if (span) span.innerText = msg;
            else div.innerText = msg;
        } else {
            div.style.display = 'none';
        }
    }

    function setCertType(type) {
        currentCertType = type;
        document.getElementById('btnParticipation').classList.remove('active');
        document.getElementById('btnPreliminary').classList.remove('active');
        document.getElementById('btnFinal').classList.remove('active');
        if (type === 'participation') document.getElementById('btnParticipation').classList.add('active');
        else if (type === 'preliminary') document.getElementById('btnPreliminary').classList.add('active');
        else document.getElementById('btnFinal').classList.add('active');

        let typeName = type === 'participation' ? '参赛证明' : (type === 'preliminary' ? '预赛获奖证书' : '决赛获奖证书');
        document.getElementById('certificateRenderArea').innerHTML = `<div class="empty-state"><p>请查询${typeName}</p></div>`;
        showError("", false);
    }

    // ==================== 事件绑定 & 初始化 ====================
    document.getElementById('searchBtn').addEventListener('click', performQuery);
    document.getElementById('btnParticipation').addEventListener('click', () => setCertType('participation'));
    document.getElementById('btnPreliminary').addEventListener('click', () => setCertType('preliminary'));
    document.getElementById('btnFinal').addEventListener('click', () => setCertType('final'));

    ['fullname', 'region', 'phone', 'organization'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('keypress', e => { if(e.key === 'Enter') performQuery(); });
    });

    loadTemplatesFromFolder();
</script>
</body>
</html>
