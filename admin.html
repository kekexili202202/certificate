<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>管理员后台 - 法律英语大赛证书系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #e2e8f0 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }
        .system-wrapper { max-width: 1400px; margin: 0 auto; }

        .admin-panel {
            background: white;
            border-radius: 2rem;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border-left: 5px solid #9b2e2e;
        }
        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            cursor: pointer;
        }
        .admin-title {
            font-weight: 700;
            color: #9b2e2e;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .admin-content {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            display: none;
        }
        .admin-content.show {
            display: block;
        }
        .template-section {
            margin-bottom: 1.5rem;
            border: 1px solid #e9ecef;
            border-radius: 1rem;
            padding: 1rem;
            background: #fafbfc;
        }
        .template-section h4 { margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
        .template-item {
            background: white;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid #e9ecef;
        }
        .template-info { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .template-badge {
            padding: 0.2rem 0.8rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .template-badge.participation { background: #e3f2fd; color: #1565c0; }
        .template-badge.preliminary { background: #fff3e0; color: #e67e22; }
        .template-badge.final { background: #fce4ec; color: #c2185b; }
        .delete-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 1rem;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .upload-folder-btn, .upload-template-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 1.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-right: 0.5rem;
        }
        .upload-folder-btn { background: #17a2b8; }
        .clear-all-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 1.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: 1rem;
        }
        .admin-note {
            font-size: 0.7rem;
            color: #6c757d;
            margin-top: 1rem;
            padding: 0.5rem;
            background: #f8f9fa;
            border-radius: 0.5rem;
        }
        .empty-templates { color: #6c757d; font-size: 0.8rem; padding: 0.5rem 0; }
        .upload-progress {
            background: #e3f2fd;
            padding: 0.5rem;
            border-radius: 0.5rem;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            display: none;
        }

        .upload-bar {
            background: white;
            border-radius: 2rem;
            padding: 1rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .upload-area {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .excel-upload-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .excel-upload-btn {
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .excel-upload-btn.participation { background: #e3f2fd; color: #1565c0; }
        .excel-upload-btn.preliminary { background: #fff3e0; color: #e67e22; }
        .excel-upload-btn.final { background: #fce4ec; color: #c2185b; }
        .excel-upload-btn.clear { background: #dc3545; color: white; }
        .data-status, .template-status {
            font-size: 0.85rem;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
        }
        .data-status { background: #e8f5e9; color: #2c5f2d; }
        .template-status { background: #e3f2fd; color: #1565c0; }
        .sample-btn {
            background: #f0f2f5;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .title-section { text-align: center; margin: 0.5rem 0 2rem 0; }
        .main-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1f3e48, #9b2e2e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .title-underline {
            width: 120px;
            height: 4px;
            background: linear-gradient(90deg, #b87c4f, #9b2e2e);
            margin: 0.5rem auto 0;
            border-radius: 4px;
        }
        .button-group {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }
        .cert-btn {
            background: white;
            border: none;
            padding: 0.9rem 2.2rem;
            border-radius: 3rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #2c4c6e;
            border: 1px solid #e0e7ed;
            box-shadow: 0 5px 12px rgba(0,0,0,0.1);
        }
        .cert-btn.active {
            background: linear-gradient(135deg, #2c5a6e, #8b3c3c);
            color: white;
            border: none;
            transform: translateY(-2px);
        }
        .query-layout { display: flex; flex-wrap: wrap; gap: 2rem; }
        .query-card {
            flex: 1.2;
            min-width: 300px;
            background: rgba(255,255,255,0.96);
            border-radius: 2rem;
            padding: 1.8rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.12);
        }
        .query-header { text-align: center; margin-bottom: 1.5rem; }
        .query-header i {
            font-size: 2.2rem;
            background: #f0e7db;
            padding: 0.6rem;
            border-radius: 60px;
            color: #8b5a2b;
        }
        .query-header h3 { margin-top: 0.5rem; font-weight: 700; color: #2c4c6e; }
        .input-group {
            margin-bottom: 1.2rem;
            display: flex;
            flex-direction: column;
        }
        .input-group label {
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #2c5a6e;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .input-group input {
            padding: 0.8rem 1rem;
            border-radius: 1.2rem;
            border: 1.5px solid #e2e8f0;
            font-size: 0.95rem;
            outline: none;
        }
        .btn-query {
            background: linear-gradient(95deg, #2c5a6e, #9b2e2e);
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 3rem;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .error-msg {
            background: #ffe8e6;
            color: #c2412c;
            padding: 0.8rem;
            border-radius: 1.2rem;
            margin-top: 1rem;
            text-align: center;
            font-size: 0.85rem;
            display: none;
        }
        .certificate-card {
            flex: 2;
            min-width: 500px;
            background: #fffef7;
            border-radius: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.25);
            overflow: auto;
            max-height: 85vh;
            border: 1px solid #eeddbb;
        }
        .certificate-preview {
            padding: 2rem;
            background: #f5f5f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .pdf-container {
            background: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border-radius: 8px;
            overflow: hidden;
            max-width: 100%;
        }
        .result-canvas { display: block; max-width: 100%; height: auto; }
        .btn-download {
            background: #2c5f2d;
            border: none;
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            margin-top: 1.5rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .empty-state { padding: 3rem; text-align: center; color: #a28e6f; }
        .loading { text-align: center; padding: 2rem; color: #2c5a6e; }
        .loading i { font-size: 2rem; margin-bottom: 1rem; }

        .participant-info-card {
            background: #faf6ed;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            width: 100%;
            border: 1px solid #eeddbb;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .participant-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #2c553d;
        }
        .cert-number {
            font-family: 'Times New Roman', Times, serif;
            font-size: 0.9rem;
            color: #8b5a2b;
            background: white;
            padding: 0.3rem 0.8rem;
            border-radius: 1.5rem;
            border: 1px solid #eddabc;
            letter-spacing: 0.5px;
        }
        .participant-details {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #8b6b42;
        }

        @media (max-width: 780px) {
            .certificate-preview { padding: 1rem; }
            .main-title { font-size: 1.8rem; }
            .certificate-card { min-width: 300px; }
        }
    </style>
</head>
<body>
<div class="system-wrapper">
    <div class="admin-panel">
        <div class="admin-header" onclick="toggleAdminPanel()">
            <div class="admin-title"><i class="fas fa-shield-alt"></i> 管理员面板 - 模板管理 <i class="fas fa-chevron-down" id="adminArrow"></i></div>
            <div style="font-size:0.7rem;">点击展开/收起</div>
        </div>
        <div class="admin-content" id="adminContent">
            <div class="template-section">
                <h4><i class="fas fa-scroll"></i> 参赛证明模板</h4>
                <div id="participationTemplateList"></div>
                <button class="upload-template-btn" onclick="uploadSingleTemplate('participation')"><i class="fas fa-upload"></i> 上传单个模板</button>
                <button class="upload-folder-btn" onclick="uploadFolderTemplates('participation')"><i class="fas fa-folder-open"></i> 批量上传文件夹</button>
            </div>
            <div class="template-section">
                <h4><i class="fas fa-trophy"></i> 预赛获奖证书模板</h4>
                <div id="preliminaryTemplateList"></div>
                <button class="upload-template-btn" onclick="uploadSingleTemplate('preliminary')"><i class="fas fa-upload"></i> 上传单个模板</button>
                <button class="upload-folder-btn" onclick="uploadFolderTemplates('preliminary')"><i class="fas fa-folder-open"></i> 批量上传文件夹</button>
            </div>
            <div class="template-section">
                <h4><i class="fas fa-crown"></i> 决赛获奖证书模板</h4>
                <div id="finalTemplateList"></div>
                <button class="upload-template-btn" onclick="uploadSingleTemplate('final')"><i class="fas fa-upload"></i> 上传单个模板</button>
                <button class="upload-folder-btn" onclick="uploadFolderTemplates('final')"><i class="fas fa-folder-open"></i> 批量上传文件夹</button>
            </div>
            <div><button class="clear-all-btn" id="clearAllTemplatesBtn"><i class="fas fa-trash-alt"></i> 清空所有模板</button></div>
            <div class="admin-note"><i class="fas fa-info-circle"></i> 模板命名规则：<br>
            - 参赛证明：赛区名称+参赛证明.pdf（如：华北及东北赛区参赛证明.pdf）<br>
            - 预赛获奖：赛区名称+预赛+奖项等级.pdf（如：华北及东北赛区预赛一等奖.pdf）<br>
            - 决赛获奖：赛区名称+决赛+奖项等级.pdf（如：华北及东北赛区决赛一等奖.pdf）<br>
            支持的赛区：华北及东北赛区、西北赛区、西南赛区、华东赛区、华南赛区</div>
            <div id="uploadProgress" class="upload-progress"></div>
        </div>
    </div>

    <div class="upload-bar">
        <div class="upload-area">
            <div class="excel-upload-group">
                <button class="excel-upload-btn participation" id="uploadParticipationExcel"><i class="fas fa-file-excel"></i> 导入参赛证明</button>
                <button class="excel-upload-btn preliminary" id="uploadPreliminaryExcel"><i class="fas fa-file-excel"></i> 导入预赛获奖</button>
                <button class="excel-upload-btn final" id="uploadFinalExcel"><i class="fas fa-file-excel"></i> 导入决赛获奖</button>
                <button class="excel-upload-btn clear" id="clearDataBtn"><i class="fas fa-trash-alt"></i> 清空所有数据</button>
            </div>
            <div class="data-status" id="dataStatus"><i class="fas fa-database"></i> 未加载数据</div>
            <div class="template-status" id="templateStatus"><i class="fas fa-file-pdf"></i> 暂无模板</div>
            <button class="sample-btn" id="loadSampleBtn"><i class="fas fa-chalkboard-user"></i> 加载演示数据</button>
        </div>
    </div>

    <div class="title-section">
        <div class="main-title">法律英语大赛证书查询</div>
        <div class="title-underline"></div>
    </div>

    <div class="button-group">
        <button class="cert-btn active" id="btnParticipation"><i class="fas fa-scroll"></i> 参赛证明</button>
        <button class="cert-btn" id="btnPreliminary"><i class="fas fa-trophy"></i> 预赛获奖证书</button>
        <button class="cert-btn" id="btnFinal"><i class="fas fa-crown"></i> 决赛获奖证书</button>
    </div>

    <div class="query-layout">
        <div class="query-card">
            <div class="query-header">
                <i class="fas fa-user-check"></i>
                <h3>选手信息核验</h3>
                <p style="font-size:0.75rem;">请输入以下四项信息查询证书</p>
            </div>
            <div class="input-group">
                <label><i class="fas fa-user"></i> 姓名</label>
                <input type="text" id="fullname" placeholder="请输入真实姓名">
            </div>
            <div class="input-group">
                <label><i class="fas fa-map-marker-alt"></i> 赛区</label>
                <input type="text" id="region" placeholder="例: 华北及东北赛区">
            </div>
            <div class="input-group">
                <label><i class="fas fa-mobile-alt"></i> 手机号</label>
                <input type="tel" id="phone" placeholder="11位手机号" maxlength="11">
            </div>
            <div class="input-group">
                <label><i class="fas fa-building"></i> 所在单位</label>
                <input type="text" id="organization" placeholder="学校/机构">
            </div>
            <button class="btn-query" id="searchBtn"><i class="fas fa-search"></i> 查询证书</button>
            <div id="errorMsg" class="error-msg"><i class="fas fa-exclamation-triangle"></i> <span>未查找到您的信息</span></div>
        </div>

        <div class="certificate-card">
            <div id="certificateRenderArea" class="certificate-preview">
                <div class="empty-state"><i class="fas fa-file-pdf"></i><p>请输入信息查询证书</p></div>
            </div>
        </div>
    </div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let pdfTemplates = {};
    let pdfTemplatesPrelim = {};
    let pdfTemplatesFinal = {};
    let currentCertType = "participation";
    let currentResultCanvas = null;

    const ADMIN_KEY = "admin123456";
    const validRegions = ["华北及东北赛区", "西北赛区", "西南赛区", "华东赛区", "华南赛区"];

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function detectRegionFromFilename(filename) {
        for (const region of validRegions) {
            if (filename.includes(region)) return region;
        }
        return null;
    }

    function detectAwardLevelFromFilename(filename, certType) {
        if (certType === 'preliminary' || certType === 'final') {
            if (filename.includes('一等奖')) return '一等奖';
            if (filename.includes('二等奖')) return '二等奖';
            if (filename.includes('三等奖')) return '三等奖';
        }
        return '';
    }

    async function loadTemplatesFromServer() {
        try {
            console.log("正在加载模板...");
            const res = await fetch('/api/templates');

            if (!res.ok) {
                throw new Error(`HTTP ${res.status}: ${res.statusText}`);
            }

            const data = await res.json();
            console.log("模板数据:", data);

            pdfTemplates = data.participation || {};
            pdfTemplatesPrelim = data.preliminary || {};
            pdfTemplatesFinal = data.final || {};

            updateTemplateStatusDisplay();
            console.log("模板加载完成 - 参赛:", Object.keys(pdfTemplates).length, "预赛:", Object.keys(pdfTemplatesPrelim).length, "决赛:", Object.keys(pdfTemplatesFinal).length);
        } catch (err) {
            console.error('加载模板失败:', err);
            document.getElementById('templateStatus').innerHTML = `<i class="fas fa-exclamation-triangle"></i> 加载失败`;
        }
    }

    async function loadParticipantsFromServer() {
        try {
            const res = await fetch('/api/participants');
            const data = await res.json();
            const participationCount = data.filter(p => p.证书类型 === 'participation' || p.证书类型 === '').length;
            const preliminaryCount = data.filter(p => p.证书类型 === 'preliminary').length;
            const finalCount = data.filter(p => p.证书类型 === 'final').length;
            document.getElementById('dataStatus').innerHTML = `<i class="fas fa-check-circle"></i> 参赛:${participationCount} 预赛:${preliminaryCount} 决赛:${finalCount}`;
            console.log("选手数据 - 参赛:", participationCount, "预赛:", preliminaryCount, "决赛:", finalCount);
            return data;
        } catch (err) {
            console.error('加载选手数据失败', err);
            return [];
        }
    }

    function blobToBase64(blob) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onloadend = () => {
                const base64 = reader.result.split(',')[1];
                resolve(base64);
            };
            reader.onerror = reject;
            reader.readAsDataURL(blob);
        });
    }

    // 通用的 Excel 上传函数
    async function uploadExcelFile(file, certType, needsAwardLevel = false) {
        try {
            const data = new Uint8Array(await file.arrayBuffer());
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

            if (!rows.length || rows.length < 2) {
                alert("Excel无数据");
                return false;
            }

            const participants = [];
            const nameIdx = 1;      // B列
            const regionIdx = 2;    // C列
            const phoneIdx = 3;     // D列
            const orgIdx = 4;       // E列
            const certIdx = 6;      // G列
            const awardIdx = 7;     // H列

            let certTypeDisplay = certType === 'participation' ? '参赛证明' : (certType === 'preliminary' ? '预赛获奖' : '决赛获奖');
            console.log(`上传${certTypeDisplay}数据，需要奖项:${needsAwardLevel}`);

            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                const name = row[nameIdx] ? String(row[nameIdx]).trim() : '';
                const region = row[regionIdx] ? String(row[regionIdx]).trim() : '';
                const phone = row[phoneIdx] ? String(row[phoneIdx]).trim() : '';
                const org = row[orgIdx] ? String(row[orgIdx]).trim() : '';
                const certificateNumber = row[certIdx] ? String(row[certIdx]).trim() : '';
                const awardLevel = row[awardIdx] ? String(row[awardIdx]).trim() : '';

                if (name && region && phone && org && certificateNumber) {
                    const participant = {
                        姓名: name,
                        赛区: region,
                        手机号: phone,
                        所在单位: org,
                        证书编号: certificateNumber
                    };

                    if (needsAwardLevel) {

    async function uploadFolderTemplates(certType) {
        const input = document.createElement('input');
        input.type = 'file';
        input.webkitdirectory = true;
        input.directory = true;
        input.multiple = true;

        input.onchange = async function(e) {
            const files = Array.from(e.target.files);
            const pdfFiles = files.filter(f => f.name.toLowerCase().endsWith('.pdf'));

            if (pdfFiles.length === 0) {
                alert('文件夹中没有PDF文件');
                return;
            }

            const progressDiv = document.getElementById('uploadProgress');
            progressDiv.style.display = 'block';
            progressDiv.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> 正在处理 ${pdfFiles.length} 个PDF文件...`;

            const templatesToUpload = [];
            const errors = [];

            for (let i = 0; i < pdfFiles.length; i++) {
                const file = pdfFiles[i];
                const region = detectRegionFromFilename(file.name);

                if (!region) {
                    errors.push(`${file.name}: 无法识别赛区`);
                    progressDiv.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> 处理中... (${i+1}/${pdfFiles.length}) 发现无效文件: ${file.name}`;
                    continue;
                }

                let awardLevel = '';
                if (certType === 'preliminary' || certType === 'final') {
                    awardLevel = detectAwardLevelFromFilename(file.name, certType);
                    if (!awardLevel) {
                        errors.push(`${file.name}: 无法识别奖项等级（需要包含一等奖/二等奖/三等奖）`);
                        progressDiv.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> 处理中... (${i+1}/${pdfFiles.length}) 发现无效文件: ${file.name}`;
                        continue;
                    }
                }

                progressDiv.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> 正在读取 ${file.name}... (${i+1}/${pdfFiles.length})`;

                try {
                    const base64 = await blobToBase64(file);
                    templatesToUpload.push({
                        cert_type: certType,
                        region: region,
                        award_level: awardLevel,
                        filename: file.name,
                        pdf_data: base64
                    });
                    console.log(`成功读取: ${file.name}`);
                } catch (err) {
                    errors.push(`${file.name}: 读取失败 - ${err.message}`);
                }
            }

            if (templatesToUpload.length === 0) {
                progressDiv.innerHTML = `<div style="color: red;">❌ 没有有效的模板文件<br>${errors.join('<br>')}</div>`;
                setTimeout(() => { progressDiv.style.display = 'none'; }, 5000);
                return;
            }

            progressDiv.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> 正在上传 ${templatesToUpload.length} 个模板到服务器...`;

            const result = await batchUploadTemplates(templatesToUpload);

            if (result.success) {
                let message = `✅ 成功上传 ${result.success_count} 个模板`;
                if (result.fail_count > 0) {
                    message += `\n❌ 失败 ${result.fail_count} 个`;
                    if (result.errors && result.errors.length > 0) {
                        message += `\n错误详情:\n${result.errors.join('\n')}`;
                    }
                }
                if (errors.length > 0) {
                    message += `\n\n跳过无效文件:\n${errors.join('\n')}`;
                }
                alert(message);
                await loadTemplatesFromServer();
            } else {
                alert(`批量上传失败: ${result.error || '未知错误'}`);
            }

            progressDiv.style.display = 'none';
        };

        input.click();
    }

    function formatNameWithSpaces(name) {
        if (!name) return "";
        const trimmed = name.trim();
        let namePart = trimmed.length === 2 ? trimmed[0] + "　" + trimmed[1] : trimmed;
        return "　" + namePart + "　";
    }

    async function replaceNameOnCanvas(canvas, name) {
        return new Promise((resolve) => {
            const ctx = canvas.getContext('2d');
            const width = canvas.width, height = canvas.height;
            const imgData = ctx.getImageData(0, 0, width, height);
            const pixels = imgData.data;
            let underlineY = -1, startX = -1, endX = -1;

            for (let y = Math.floor(height * 0.3); y < Math.floor(height * 0.8); y++) {
                let maxLen = 0, lineStart = -1, lineEnd = -1, curLen = 0, curStart = -1;
                for (let x = 0; x < width; x++) {
                    const idx = (y * width + x) * 4;
                    const isDark = pixels[idx] < 80 && pixels[idx+1] < 80 && pixels[idx+2] < 80;
                    if (isDark) {
                        if (curStart === -1) curStart = x;
                        curLen++;
                    } else {
                        if (curLen > 30 && curLen > maxLen) {
                            maxLen = curLen;
                            lineStart = curStart;
                            lineEnd = x - 1;
                        }
                        curLen = 0;
                        curStart = -1;
                    }
                }
                if (curLen > 30 && curLen > maxLen) {
                    maxLen = curLen;
                    lineStart = curStart;
                    lineEnd = width - 1;
                }
                if (maxLen > 80) {
                    underlineY = y;
                    startX = lineStart;
                    endX = lineEnd;
                    break;
                }
            }
            if (underlineY === -1) {
                underlineY = Math.floor(height * 0.6);
                startX = Math.floor(width * 0.35);
                endX = Math.floor(width * 0.65);
            }

            const fixedLeft = startX;
            ctx.save();
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(fixedLeft - 20, underlineY - 95, (endX - startX) + 300, 140);
            const nameY = underlineY - 32;
            let fontSize = Math.floor(width / 65);
            fontSize = Math.min(fontSize, 80);
            fontSize = Math.max(fontSize, 80);
            ctx.font = `${fontSize}px "华文行楷", "STXingkai", "KaiTi", cursive`;
            ctx.fillStyle = "#000000";
            ctx.textAlign = "left";
            ctx.textBaseline = "middle";
            const formatted = formatNameWithSpaces(name);
            ctx.fillText(formatted, fixedLeft, nameY);
            const textWidth = ctx.measureText(formatted).width;
            const underlineYPos = nameY + fontSize * 0.48;
            ctx.beginPath();
            ctx.lineWidth = Math.max(fontSize * 0.07, 3);
            ctx.strokeStyle = "#000000";
            ctx.moveTo(fixedLeft - 3, underlineYPos);
            ctx.lineTo(fixedLeft + textWidth + 8, underlineYPos);
            ctx.stroke();
            ctx.restore();
            resolve(canvas);
        });
    }

    async function renderPdfWithNameReplacement(pdfData, name) {
        const loadingTask = pdfjsLib.getDocument(pdfData.pdf_data ? `data:application/pdf;base64,${pdfData.pdf_data}` : pdfData.url);
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        const scale = 3.0;
        const viewport = page.getViewport({ scale: scale });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
        return await replaceNameOnCanvas(canvas, name);
    }

                </div>`;

            document.getElementById('downloadBtn').onclick = () => {
                const link = document.createElement('a');
                link.download = `法律英语大赛_${certName}_${participant.姓名}_${certificateNumber}.png`;
                link.href = currentResultCanvas.toDataURL('image/png');
                link.click();
            };
            return true;
        } catch (err) {
            document.getElementById('certificateRenderArea').innerHTML = `<div class="empty-state"><p>生成失败: ${err.message}</p></div>`;
            return false;
        }
    }

    function showError(msg, show) {
        const div = document.getElementById('errorMsg');
        if (show) { div.style.display = 'block'; div.querySelector('span').innerText = msg; }
        else div.style.display = 'none';
    }

    function setCertType(type) {
        currentCertType = type;
        document.getElementById('btnParticipation').classList.remove('active');
        document.getElementById('btnPreliminary').classList.remove('active');
        document.getElementById('btnFinal').classList.remove('active');
        if (type === 'participation') document.getElementById('btnParticipation').classList.add('active');
        else if (type === 'preliminary') document.getElementById('btnPreliminary').classList.add('active');
        else document.getElementById('btnFinal').classList.add('active');
        document.getElementById('certificateRenderArea').innerHTML = `<div class="empty-state"><p>请查询${type === 'participation' ? '参赛证明' : (type === 'preliminary' ? '预赛获奖证书' : '决赛获奖证书')}</p></div>`;
    }

    window.toggleAdminPanel = function() {
        const content = document.getElementById('adminContent');
        const arrow = document.getElementById('adminArrow');
        if (content.classList.contains('show')) {
            content.classList.remove('show');
            arrow.style.transform = 'rotate(0deg)';
        } else {
            content.classList.add('show');
            arrow.style.transform = 'rotate(180deg)';
        }
    };

    // 绑定上传按钮事件
    document.getElementById('uploadParticipationExcel').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.xlsx, .xls, .csv';
        input.onchange = (e) => {
            if (e.target.files.length) uploadExcelFile(e.target.files[0], 'participation', false);
        };
        input.click();
    });

    document.getElementById('uploadPreliminaryExcel').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.xlsx, .xls, .csv';
        input.onchange = (e) => {
            if (e.target.files.length) uploadExcelFile(e.target.files[0], 'preliminary', true);
        };
        input.click();
    });

    document.getElementById('uploadFinalExcel').addEventListener('click', () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.xlsx, .xls, .csv';
        input.onchange = (e) => {
            if (e.target.files.length) uploadExcelFile(e.target.files[0], 'final', true);
        };
        input.click();
    });

    document.getElementById('clearDataBtn').addEventListener('click', clearAllData);
    document.getElementById('loadSampleBtn').addEventListener('click', loadDemoData);
    document.getElementById('searchBtn').addEventListener('click', performQuery);
    document.getElementById('btnParticipation').addEventListener('click', () => setCertType('participation'));
    document.getElementById('btnPreliminary').addEventListener('click', () => setCertType('preliminary'));
    document.getElementById('btnFinal').addEventListener('click', () => setCertType('final'));
    document.getElementById('clearAllTemplatesBtn')?.addEventListener('click', clearAllTemplatesOnServer);

    ['fullname', 'region', 'phone', 'organization'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('keypress', e => { if(e.key === 'Enter') performQuery(); });
    });

    async function initializeData() {
        console.log("页面启动...");
        await loadTemplatesFromServer();
        await loadParticipantsFromServer();
        console.log("初始化完成");
    }

    initializeData();
</script>
</body>
</html>
